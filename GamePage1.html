<!Doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo 1</title>
    <link rel="shortcut icon" type="image/x-icon" href="img/imagem_2026-05-20_140644013-removebg-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

    <!--CSS INTERNO-->
    <style>
         html, body {
            height: 100vh;
            width: 100vw;
            background-color: #121440;
            overflow: hidden;
        /* --- iNICIO DO CSS INTERNO --- */
        .cabeca {
            padding: 80px;
        }
        .btn-voltar {
            background-color: transparent;
            border: none;
            cursor: pointer;
            position: absolute;
            top: 30px;
            left: 20px;
        }
        .bi-arrow-bar-left {
            color: #8ad4ff;
            width: 40px;
            height: 40px;
        }
        h1 {
            position: absolute;
            top: 100px;
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            color: #ffffff;
            font-size: 36px;
        }
        /*--- Carrossel ---*/
        .carrossel {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px; /* Altura do carrossel */
            width: 100%; /* Largura do carrossel */
            background-color: #ffffff00; /* Cor de fundo para destacar o carrossel */
        }
         .carrossel-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .carrossel-slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Garante que a imagem preencha o espaço */
        }

        /* Botões de Navegação */
        .btn-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: #8ad4ff7c;
            color: #3f3381;
            border: none;
            padding: 15px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .btn-nav:hover {
            background-color: rgba(30, 3, 85, 0.24);
        }

        .btn-anterior { left: 10px; }
        .btn-proximo { right: 10px; }

        /* Indicadores (Bolinhas) */
        .indicadores {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .bolinha {
            width: 12px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }

        .bolinha.ativo {
            background-color: white;
            transform: scale(1.2);
        }
        
        /*--- Descrição do Jogo ---*/
        .descricao-jogo {
            position: absolute;
            bottom: 200px; /* Distância do rodapé */
            width: 80%;
            text-align: center;
            color: #797da1;
            font-size: 16px;
        }

        /*--- Botão Play ---*/
        .play-button {
            position: absolute;
            bottom: 80px; /* Distância do rodapé */
            width: 300px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 20px;
            color:  #0e103b;
            background-color: #8ad4ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
    </style>
</head>
<body>
   <div class="cabeca">
    <!---SETA DE SAÍDA-->
    <button class ="btn-voltar" onclick="window.location.href='index.html'"><!--Isso fará com que o usuário volte para a página inicial-->
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-bar-left" viewBox="0 0 16 16">
    <path fill-rule="evenodd" d="M12.5 15a.5.5 0 0 1-.5-.5v-13a.5.5 0 0 1 1 0v13a.5.5 0 0 1-.5.5M10 8a.5.5 0 0 1-.5.5H3.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L3.707 7.5H9.5a.5.5 0 0 1 .5.5"/>
    </svg>
    </button> 
   </div>

    <!-- CARROSSEL -->
     <section class="carrossel">
        <h1>{NOME_JOGO}</h1>

    <div class="carrossel-container">
        <!-- Slides com imagens -->
        <div class="carrossel-slides" id="slides">
            <div class="slide"><img src="https://picsum.photos" alt="Imagem 1"></div>
            <div class="slide"><img src="https://picsum.photos" alt="Imagem 2"></div>
            <div class="slide"><img src="https://picsum.photos" alt="Imagem 3"></div>
        </div>

        <!-- Botões -->
        <button class="btn-nav btn-anterior" onclick="mudarSlide(-1)">&#10094;</button>
        <button class="btn-nav btn-proximo" onclick="mudarSlide(1)">&#10095;</button>

        <!-- Indicadores -->
        <div class="indicadores">
            <div class="bolinha ativo" onclick="irParaSlide(0)"></div>
            <div class="bolinha" onclick="irParaSlide(1)"></div>
            <div class="bolinha" onclick="irParaSlide(2)"></div>
        </div>
    </div>
    <!--Descrição do Jogo-->
    <div class="descricao-jogo">
        <p>{DESCRICAO_JOGO}</p>
    </div>
    </section>
    
    <!--PLAY-->
    <button class="play-button" onclick="iniciarJogo()">Play</button>


    <script>
        // --- JAVASCRIPT INTERNO ---
        let indexAtual = 0;
        const containerSlides = document.getElementById('slides');
        const bolinhas = document.querySelectorAll('.bolinha');
        const totalSlides = document.querySelectorAll('.slide').length;

        function atualizarCarrossel() {
            // Move o container horizontalmente com base no index atual
            containerSlides.style.transform = `translateX(${-indexAtual * 100}%)`;
            
            // Atualiza os indicadores (bolinhas)
            bolinhas.forEach((bolinha, i) => {
                if (i === indexAtual) {
                    bolinha.classList.add('ativo');
                } else {
                    bolinha.classList.remove('ativo');
                }
            });
        }

        function mudarSlide(direcao) {
            indexAtual += direcao;
            
            // Loop: se passar do fim vai pro início, se passar do início vai pro fim
            if (indexAtual >= totalSlides) {
                indexAtual = 0;
            } else if (indexAtual < 0) {
                indexAtual = totalSlides - 1;
            }
            
            atualizarCarrossel();
        }

        function irParaSlide(index) {
            indexAtual = index;
            atualizarCarrossel();
        }
    </script>
</body>
<footer>
    <p style="position: absolute; bottom: 0; left: 2%; color: #ffffff9a; padding: 40px;">&copy; 2026 . QMATH</p>
</footer>
